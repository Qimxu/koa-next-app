name: Bug Report
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的 Bug 报告！请填写以下信息帮助我们快速定位问题。

  - type: input
    id: version
    attributes:
      label: 版本信息
      description: 你使用的项目版本号（如 v1.0.0）
      placeholder: v1.0.0
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 运行环境
      options:
        - Node.js 18
        - Node.js 20
        - Node.js 22
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述 Bug
      placeholder: 发生了什么？
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 执行 '...'
        2. 点击 '...'
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: 应该正常返回...

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 返回了错误...

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 如果有错误日志或堆栈跟踪，请粘贴
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索过现有的 issues，确认没有重复报告
          required: true
        - label: 我已经提供了足够的信息来复现问题
          required: true
