name: Feature Request
description: 建议一个新功能
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的想法。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述你想要的功能
      placeholder: 我希望能够...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 动机/使用场景
      description: 为什么需要这个功能？它会解决什么问题？
      placeholder: 当我在使用...时，经常遇到...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 如果你有实现思路，请描述
      placeholder: 可以添加一个 API 端点...

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他解决方案

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索过现有的 issues，确认没有重复的功能请求
          required: true
        - label: 这个功能对项目的多数用户有价值
          required: false
