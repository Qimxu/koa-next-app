# Application Configuration
app:
  port: 3001
  nodeEnv: development
  apiBaseUrl: http://localhost:3001

# Database Configuration
db:
  type: mysql
  host: localhost
  port: 3306
  username: root
  password:
  database: nest_next_app
  synchronize: true

# Redis Configuration
redis:
  host: localhost
  port: 6379
  password:
  db: 0

# JWT Configuration
# ⚠️ 生产环境必须通过环境变量设置 JWT_SECRET 和 JWT_REFRESH_SECRET
jwt:
  secret: ${JWT_SECRET:your-jwt-secret-key-change-in-production}
  refreshSecret: ${JWT_REFRESH_SECRET:your-jwt-refresh-secret-key-change-in-production}
  expiresIn: 30m
  refreshExpiresIn: 7d

# Throttle Configuration
throttle:
  ttl: 60000
  limit: 5000
